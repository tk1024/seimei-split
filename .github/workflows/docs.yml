name: Update docs

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "vite.config.docs.ts"

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Install published package for dictionary data
        run: npm install seimei-split --no-save

      - name: Build docs
        run: npm run build:docs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to docs"
          else
            git commit -m "docs: auto-update docs/seimei-split.js [skip ci]"
            git push
          fi
