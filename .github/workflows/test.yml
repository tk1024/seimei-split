name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Install published package for dictionary data
        run: npm install seimei-split --no-save

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
